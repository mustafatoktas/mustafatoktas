<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 800 100'
    style='background-color: #00000000;'
    width='800px' height='100px'>

    
                <path id='path0'>
                            <!-- Single line -->
                                <animate id='d0' attributeName='d' begin='0s;d2.end'
                    dur='3000ms' fill='remove'
                    values='m0,50 h0 ; m0,50 h800 ; m0,50 h800 ; m0,50 h0' keyTimes='0;0.8;0.8;1' />
                    </path>
    <text font-family='"monospace", monospace' fill='#30DC72' font-size='40'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'>
        <textPath xlink:href='#path0'>
            I&#039;m an Android Developer
        </textPath>
    </text>
        <path id='path1'>
                            <!-- Single line -->
                                <animate id='d1' attributeName='d' begin='d0.end'
                    dur='3000ms' fill='remove'
                    values='m0,50 h0 ; m0,50 h800 ; m0,50 h800 ; m0,50 h0' keyTimes='0;0.8;0.8;1' />
                    </path>
    <text font-family='"monospace", monospace' fill='#30DC72' font-size='40'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'>
        <textPath xlink:href='#path1'>
            I&#039;m a WEB Developer
        </textPath>
    </text>
        <path id='path2'>
                            <!-- Single line -->
                                <animate id='d2' attributeName='d' begin='d1.end'
                    dur='3000ms' fill='remove'
                    values='m0,50 h0 ; m0,50 h800 ; m0,50 h800 ; m0,50 h0' keyTimes='0;0.8;0.8;1' />
                    </path>
    <text font-family='"monospace", monospace' fill='#30DC72' font-size='40'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'>
        <textPath xlink:href='#path2'>
            I&#039;m an Android Lover
        </textPath>
    </text>
</svg>
